name: CI (Vitest)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests (Vitest)
        run: npm test
        
      # 【追加箇所】Playwright専用のブラウザをインストール。
      # GitHub上の仮想サーバーにはブラウザが入っていないため、この工程が必須です。
      # --with-deps をつけることで、実行に必要なOSライブラリも一緒にセットアップします。
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # 【追加箇所】Playwrightのテストを実行。
      # これにより、GitHub上で実際のブラウザ操作テストが開始されます。
      - name: Run Playwright tests
        run: npx playwright test

      # 【追加箇所】テスト結果（レポート）の保存。
      # テストが失敗した際、GitHub上でスクリーンショットやエラー箇所を確認するために必要です。
      # `if: always()` をつけることで、テストが失敗しても必ず保存されるようにします。
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
