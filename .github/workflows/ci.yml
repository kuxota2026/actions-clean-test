name: CI (Node Setup)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Show versions
        run: |
          node -v
          npm -v
          echo "✅ Node.js setup is working"